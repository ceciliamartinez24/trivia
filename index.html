<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trivia</title>
</head>
<body>
    
   <div id="inicio">
        <h1>Bienvenidos a esta trivia!</h1>
        <h4>Seleccione una categoria:</h4>

        <div id="categorias"></div>
        <p id="error" style="display:  none;">Error</p>
    </div> 

    <div id="dificultad" style="display: none;">
        <h3>Seleccionar nivel de dificultad: </h3>
        <div id="btnNiveles"></div>
    </div>

    <div id="juego" style="display: none;">
        <p id="progreso">Preguntas: </p>
        <p>Tiempo restante: <span id="contador">5</span></p>
        <h3 id="pregunta"></h3>
    </div>

    <div id="resultado" style="display: none;">
        <h2>Resultados:</h2>
        <p id="correctas">Correctas: </p>
        <p id="incorectas">Incorrectas: </p>
        <p id="noRespondidas">No respondidas: </p>
    </div>


    <script src="main.js"></script>
</body>
</html>
