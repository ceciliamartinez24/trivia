<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trivia</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    
   <div id="inicio" style="display: block;">
        <h1>Bienvenidos a esta trivia!</h1>
        <h4>Seleccione una categoria:</h4>

        <div id="categorias" style="display: block;"></div>
        <p id="error" style="display:  none;">Error</p>
    </div> 

    <div id="dificultad" style="display: none;">
        <h3>Seleccionar nivel de dificultad: </h3>
        <div id="btnNiveles"></div>
    </div>

    <div id="opciones"></div>

    <div id="juego" style="display: none;">
        <p id="progreso">Preguntas: </p>
        <div id="pregunta"></div>
        <p>Tiempo restante: <span id="contador">5</span></p>
    </div>

    <div id="resultados" style="display: none;">
        <h2>Resultados:</h2>
        <p id="correctas">Correctas: </p>
        <p id="incorrectas">Incorrectas: </p>
        <p id="noRespondidas">No respondidas: </p>
    </div>


    <script src="main.js"></script>
</body>
</html>
